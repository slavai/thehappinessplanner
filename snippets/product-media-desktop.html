<product-media-variants class="product-media--variants--root" data-id="{{ section.id }}_{{ product.id }}" data-layout="thumbnails" data-first-variant-media="{{ product.featured_media.id }}" data-variant-scroll="true"> <div class="product-media--variants"><div class="product-media--container" data-container="panel" data-columns="1">{{#for product.media as |m|}}<div class="product-media--root" data-id="{{ m.id }}" data-active="{{#if forloop.first}}true{{else}}false{{/if}}" data-media-type="image" style="--product-media--aspect-ratio:0.706;"><modal-trigger class="product-media--modal" data-id="{{ section.id }}_{{ product.id }}_main-product" data-index="{{ forloop.index0 }}" aria-label="Enlarge product image" tabindex="0"><product-zoom-element class="product-zoom--root" data-id="{{ m.id }}" data-magnify="1.7"><img src="{{ image_url m width=500 }}" alt="{{ default m.alt product.title }}" srcset="{{ image_url m width=300 }} 300w, {{ image_url m width=400 }} 400w, {{ image_url m width=500 }} 500w" width="505" height="715" loading="{{#if forloop.first}}eager{{else}}lazy{{/if}}" class="product-zoom--wrapper" sizes="(max-width: 767px) calc(100vw - 32px), calc(1200px - 519px)" fetchpriority="{{#if forloop.first}}high{{else}}auto{{/if}}"><img src="{{ image_url m width=500 }}" alt="{{ default m.alt product.title }}" srcset="{{ image_url m width=300 }} 300w, {{ image_url m width=400 }} 400w, {{ image_url m width=500 }} 500w" width="505" height="715" loading="lazy" class="product-zoom--enlarged" sizes="(max-width: 767px) calc(100vw - 32px), calc(1200px - 519px)" aria-hidden="true" style="--enlarged-width: {{#if forloop.first}}1157.7px{{else}}0px{{/if}};"></product-zoom-element></modal-trigger></div>{{/for}}</div> </div><product-thumbs-element class="product-media--thumbs" data-id="{{ section.id }}_{{ product.id }}"> <div class="product-media--thumbs-wrapper">{{#for product.media as |m|}}<div class="product-media--thumb" data-active="{{#if forloop.first}}true{{else}}false{{/if}}" data-id="{{ m.id }}" tabindex="0"><img src="{{ image_url m width=200 }}" alt="{{ default m.alt product.title }}" srcset="{{ image_url m width=50 }} 50w, {{ image_url m width=100 }} 100w, {{ image_url m width=200 }} 200w" width="505" height="715" loading="lazy" sizes="80px"></div>{{/for}}</div> </product-thumbs-element></product-media-variants>
