<div class="product-form--block" data-block-type="options" data-fit-together="false">{{#unless product.has_only_default_variant}}<product-options-element class="product-options--root" data-id="{{ section.id }}_{{ product.id }}" data-main-product="true" data-product-handle="{{ product.handle }}" data-product-url="{{ product.url }}" aria-busy="false"><div class="product-options--container">{{#for product.options_with_values as |option|}}<div class="product-options--option" data-index="{{ forloop.index0 }}"><disclosure-element class="disclosure--root" data-id="{{ section.id }}_{{ product.id }}_opt{{ forloop.index0 }}" data-type="option-picker"><label class="disclosure--label" id="{{ section.id }}_{{ product.id }}_opt{{ forloop.index0 }}-toggle" data-item="nav-text"><span>{{ option.name }}</span></label><div class="disclosure--main"><button class="disclosure--toggle" data-item="nav-text" aria-expanded="false" aria-controls="{{ section.id }}_{{ product.id }}_opt{{ forloop.index0 }}" aria-labelledby="{{ section.id }}_{{ product.id }}_opt{{ forloop.index0 }}-toggle"><div class="disclosure--current-option">{{#if (eq forloop.index0 0)}}{{ product.selected_or_first_available_variant.option1 }}{{/if}}{{#if (eq forloop.index0 1)}}{{ product.selected_or_first_available_variant.option2 }}{{/if}}{{#if (eq forloop.index0 2)}}{{ product.selected_or_first_available_variant.option3 }}{{/if}}</div><svg class="icon--root icon--chevron-down" data-invertible="true" width="10" height="6" viewBox="0 0 10 6" xmlns="http://www.w3.org/2000/svg"><path d="M5 4.058 8.53.528l.707.707-3.53 3.53L5 5.472.763 1.235 1.47.528 5 4.058Z" fill="#000" fill-rule="nonzero"></path></svg></button><ul class="disclosure--form" id="{{ section.id }}_{{ product.id }}_opt{{ forloop.index0 }}" data-transition-item="viewport" data-transition-type="scale-in" data-transition-trigger="custom" aria-hidden="true" data-transition-active="false">{{#for option.values as |value|}}<li class="disclosure--option" tabindex="0" data-item="sub-nav-text" data-value="{{ value }}" data-option-name="{{ option.name }}" data-option-index="{{ forloop.parentloop.index0 }}" aria-current="{{#if (eq forloop.parentloop.index0 0)}}{{#if (eq value ../product.selected_or_first_available_variant.option1)}}true{{else}}false{{/if}}{{/if}}{{#if (eq forloop.parentloop.index0 1)}}{{#if (eq value ../product.selected_or_first_available_variant.option2)}}true{{else}}false{{/if}}{{/if}}{{#if (eq forloop.parentloop.index0 2)}}{{#if (eq value ../product.selected_or_first_available_variant.option3)}}true{{else}}false{{/if}}{{/if}}">{{ value }}</li>{{/for}}</ul><input class="disclosure--input" type="hidden" value="{{#if (eq forloop.index0 0)}}{{ product.selected_or_first_available_variant.option1 }}{{/if}}{{#if (eq forloop.index0 1)}}{{ product.selected_or_first_available_variant.option2 }}{{/if}}{{#if (eq forloop.index0 2)}}{{ product.selected_or_first_available_variant.option3 }}{{/if}}" data-option-name="{{ option.name }}" data-option-index="{{ forloop.index0 }}" data-item="disclosure"></div></disclosure-element></div>{{/for}}</div><script type="application/json" class="product-options--variants-json">{{{ json product.variants }}}</script></product-options-element>{{/unless}}</div>
