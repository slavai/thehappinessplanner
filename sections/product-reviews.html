<div id="shopline-section-{{ section.id }}" class="shopify-section section--apps">
  <div class="apps--root" data-section-id="{{ section.id }}" data-background-color="none" data-border="none" data-container-width="4" data-mobile-full-width="false" data-mobile-spacing-above="half" data-mobile-spacing-below="half" data-spacing-above="full" data-spacing-below="full" data-text-alignment="center">
    <div class="apps--wrapper">
      <div class="shopify-block shopify-app-block">
        <div id="stamped-main-widget"
             data-widget-type="standard2"
             data-product-id="{{ product.id }}"
             data-name="{{ product.title }}"
             data-url="{{ shop.url }}{{ product.url }}"
             data-image-url="{{ image_url product.featured_image width=600 }}"
             data-description="{{ product.description }}"
             data-product-sku="{{ product.sku }}"
             data-product-title="{{ product.title }}"
             data-product-type="{{ product.type }}"></div>
      </div>
    </div>
  </div>

  <script>
    window.StampedFn = window.StampedFn || {};
    StampedFn.init = StampedFn.init || function () {
      StampedFn.apiKey = '{{ settings.stamped_api_key }}';
      StampedFn.storeUrl = '{{ shop.domain }}';
    };
    StampedFn.init();
  </script>
  <script src="https://cdn1.stamped.io/files/widget.min.js" data-shop_id="{{ settings.stamped_shop_id }}" defer></script>
</div>

{{#schema}}
{
  "name": "Product Reviews",
  "tag": "section",
  "class": "section--apps"
}
{{/schema}}
