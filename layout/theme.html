<!DOCTYPE html>
<html lang="{{ shop.locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}{{#if page_title}} &ndash; {{/if}}{{ shop.name }}</title>
  {{#if page_description}}<meta name="description" content="{{ page_description }}">{{/if}}
  {{ content_for_header }}
  <link rel="stylesheet" href="{{ asset_url 'theme.css' }}">
</head>
<body>
  {{ section 'announcement' }}
  {{ section 'header' }}
  <main id="main-content" role="main">
    {{ content_for_layout }}
  </main>
  {{ section 'footer' }}
</body>
</html>
