<!DOCTYPE html>
<html lang="{{ shop.locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}{{#if page_title}} &ndash; {{/if}}{{ shop.name }}</title>
  {{#if page_description}}<meta name="description" content="{{ page_description }}">{{/if}}
  {{ content_for_header }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;700&family=Playfair+Display:wght@400;700&family=Roboto:wght@400;700&display=swap">
  {{ stylesheet_tag (asset_url 'theme.css') }}
  <script>
    window.routes = { cart_change_url: "{{ routes.cart_change_url }}", cart_url: "/cart" };
    // Stamped.io auto-resolves credentials from window.Shopify.shop — shim it
    // so Stamped's getappkey call targets the correct registered shop.
    window.Shopify = window.Shopify || {};
    window.Shopify.shop = window.Shopify.shop || "{{ settings.stamped_shopify_domain }}";
    window.Shopify.country = window.Shopify.country || "US";
  </script>
  {{ script_tag (asset_url 'theme.js') }}
</head>
<body>
  {{ section 'announcement' }}
  {{ section 'header' }}
  <main id="main-content" role="main">
    {{ content_for_layout }}
  </main>
  {{ section 'footer' }}
  {{ content_for_footer }}
</body>
</html>
