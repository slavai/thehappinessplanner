<main-product-carousel class="carousel--root" data-id="{{ section.id }}_{{ product.id }}" data-last-slide="false" data-auto-rotate="false" data-columns="1" data-mobile-columns="1" data-spacing-around-blocks="true" data-transition-type="slide" style="--total-slides:{{ product.media.size }};--total-slides-mobile:{{ product.media.size }};--total-spaces:{{ product.media.size }};--total-spaces-mobile:{{ product.media.size }};--slide-height:calc((100vw - 48px) / 0.7062937062937062);"> <div class="carousel--wrapper"> <div class="carousel--container">{{#for product.media as |m|}}<div class="carousel--block" data-id="{{ section.id }}--block-{{ forloop.index }}"><div class="product-media--root" data-id="{{ m.id }}" data-active="{{#if forloop.first}}true{{else}}false{{/if}}" data-media-type="image" style="--product-media--aspect-ratio:0.706;"><img src="{{ image_url m width=500 }}" alt="{{ default m.alt product.title }}" srcset="{{ image_url m width=300 }} 300w, {{ image_url m width=400 }} 400w, {{ image_url m width=500 }} 500w" width="505" height="715" loading="{{#if forloop.first}}eager{{else}}lazy{{/if}}" sizes="(max-width: 767px) calc(100vw - 32px), 352px" fetchpriority="{{#if forloop.first}}high{{else}}auto{{/if}}"></div></div>{{/for}}</div> </div></main-product-carousel><div class="carousel-nav-arrow" data-id="{{ section.id }}_{{ product.id }}" data-mq="small"> <button class="carousel-nav-arrow--prev" type="button" aria-disabled="true" aria-label="previous"><svg class="icon--root icon--chevron-left" data-invertible="true" width="12" height="20" viewBox="0 0 12 20" xmlns="http://www.w3.org/2000/svg"> <path d="m3.13 10 8.58 8.58L10.29 20l-10-10 10-10 1.42 1.42z" fill="#000" fill-rule="nonzero"></path> </svg></button> <span class="carousel-nav-arrow--current" data-item="paragraph" data-value="1"></span> <span class="carousel-nav-arrow--total" data-item="paragraph" data-value="1" data-mobile-value="{{ product.media.size }}"></span> <button class="carousel-nav-arrow--next" type="button" aria-disabled="false" aria-label="next"><svg class="icon--root icon--chevron-right" data-invertible="true" width="12" height="20" viewBox="0 0 12 20" xmlns="http://www.w3.org/2000/svg"> <path d="M8.87 10 .29 1.42 1.71 0l10 10-10 10-1.42-1.42z" fill="#000" fill-rule="nonzero"></path> </svg></button> </div>
